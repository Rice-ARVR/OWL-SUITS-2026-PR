services:
  dev:
    build:
      context: .devcontainer
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
      - "5173:5173"
    volumes:
      - .:/workspace
    environment:
      - PYTHONUNBUFFERED=1
      - VITE_API_URL=http://localhost:8000
      - UVICORN_HOST=0.0.0.0
    command: sleep infinity