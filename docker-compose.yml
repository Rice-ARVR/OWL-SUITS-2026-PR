services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace # entire monorepo visible
      - ./server:/app # server code as the actual working dir
      - /app/.venv # preserve venv from image build
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - server
    restart: unless-stopped
